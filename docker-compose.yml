version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: testplatform-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: testplatform
      MYSQL_USER: testplatform
      MYSQL_PASSWORD: testplatform123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - testplatform-network

  redis:
    image: redis:7-alpine
    container_name: testplatform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - testplatform-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: testplatform-backend
    environment:
      DATABASE_URL: mysql+pymysql://testplatform:testplatform123@mysql:3306/testplatform?charset=utf8mb4
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    depends_on:
      - mysql
      - redis
    networks:
      - testplatform-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: testplatform-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - testplatform-network
    command: npm run dev

volumes:
  mysql_data:
  redis_data:

networks:
  testplatform-network:
    driver: bridge
